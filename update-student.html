<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✏️ Update Student Fee · Fee Manager</title>
    <!-- Bootstrap CSS for modal and table -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f5fa;
            padding: 20px 12px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .page-header {
            background: white;
            border-radius: 50px;
            padding: 16px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .page-header h1 {
            font-size: 1.8rem;
            color: #113a5e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-link a {
            color: #1b4f9b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 20px;
            background: #e8f0fe;
            border-radius: 40px;
        }
        
        /* Filter Panel */
        .filter-panel {
            background: white;
            border-radius: 60px;
            padding: 20px 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,30,60,0.08);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .filter-group label {
            font-weight: 600;
            color: #154e7a;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        select {
            background: #e8f2ff;
            border: 1px solid #b1cdf0;
            border-radius: 40px;
            padding: 10px 30px 10px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #10345c;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%231b4f9b" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            min-width: 150px;
        }

        /* Table Card */
        .table-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,40,70,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #1b4f9b;
            color: white;
            padding: 15px 10px;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: left;
        }
        th:first-child { border-radius: 20px 0 0 0; }
        th:last-child { border-radius: 0 20px 0 0; }
        
        td {
            padding: 15px 10px;
            border-bottom: 1px solid #e0eaf5;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f5faff; }
        
        .student-name {
            font-weight: 600;
            color: #113155;
        }
        .father-name {
            font-size: 0.9rem;
            color: #5f6b7a;
        }
        .amount-badge {
            background: #e8f0fe;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
        }
        .due-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
        }
        .update-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .update-btn:hover {
            background: #1b4b9b;
            transform: scale(1.02);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #1b4f9b;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            color: #5f6b7a;
        }

        /* Progress Bar Overlay */
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(3px);
        }
        .progress-card {
            background: white;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .progress-card h3 {
            color: #1b4f9b;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background: #e8f0fe;
            border-radius: 30px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1b4f9b, #2563eb);
            border-radius: 30px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1b4f9b;
            margin: 15px 0;
        }
        .progress-step {
            color: #5f6b7a;
            font-size: 1rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e8f0fe;
            border-top: 5px solid #1b4f9b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .page-header h1 { font-size: 1.4rem; }
            .filter-group { width: 100%; }
            select { width: 100%; }
            td, th { padding: 10px 5px; font-size: 0.85rem; }
            .update-btn { padding: 5px 10px; font-size: 0.8rem; }
            .progress-card { padding: 25px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="page-header">
        <h1><i class="fas fa-edit"></i> Update Student Fee</h1>
        <div class="back-link">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Session</label>
            <select id="sessionFilter">
                <option value="2024-25">2024-25</option>
                <option value="2025-26" selected>2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-school"></i> Class</label>
            <select id="classFilter">
                <option value="All">All Classes</option>
                <option value="Class 6">Class 6</option>
                <option value="Class 7">Class 7</option>
                <option value="Class 8">Class 8</option>
                <option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option>
            </select>
        </div>
    </div>

    <!-- Students Table -->
    <div class="table-card">
        <div id="studentsTableContainer">
            <!-- Table will be loaded here -->
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading students...</div>
        </div>
    </div>
</div>

<!-- Update Modal (Popup) -->
<div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 30px;">
            <div class="modal-header" style="border-bottom: 2px solid #e9ecef; padding: 20px 25px;">
                <h5 class="modal-title" style="color: #1b4f9b; font-weight: 700;">
                    <i class="fas fa-rupee-sign"></i> Update Fee & Generate Invoice
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <div id="modalStudentInfo" style="background: #f8faff; padding: 15px; border-radius: 20px; margin-bottom: 20px;">
                    <!-- Student info will be filled here -->
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Additional Amount (₹)</label>
                    <input type="number" id="additionalAmount" class="form-control form-control-lg" min="1" placeholder="Enter amount" style="border-radius: 20px;">
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="generateInvoiceCheck" checked>
                    <label class="form-check-label fw-bold">
                        <i class="fas fa-file-invoice"></i> Generate Invoice after update
                    </label>
                </div>
            </div>
            <div class="modal-footer" style="border-top: 2px solid #e9ecef; padding: 20px;">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius: 50px; padding: 12px 25px;">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" id="confirmUpdateBtn" class="btn btn-primary" style="border-radius: 50px; padding: 12px 25px; background: #1b4f9b;">
                    <i class="fas fa-check"></i> Update & Generate
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Progress Bar Overlay -->
<div id="progressOverlay" class="progress-overlay">
    <div class="progress-card">
        <div class="spinner"></div>
        <h3><i class="fas fa-sync-alt fa-spin"></i> Processing Payment</h3>
        <div class="progress-bar-container">
            <div id="progressFill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <div id="progressText" class="progress-text">0% Complete</div>
        <div id="progressStep" class="progress-step">Initializing...</div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    // Initialize Firebase with error handling
    let db = null;
    let feesCollection = null;

    try {
        // Check if Firebase is already initialized
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app(); // Use existing app
        }
        db = firebase.firestore();
        feesCollection = db.collection('fees');
        console.log('Firebase initialized successfully');
    } catch (error) {
        console.error('Firebase initialization error:', error);
        alert('Firebase connection failed. Please check your internet connection.');
    }

    // DOM Elements
    const sessionFilter = document.getElementById('sessionFilter');
    const classFilter = document.getElementById('classFilter');
    const tableContainer = document.getElementById('studentsTableContainer');
    
    // Modal Elements
    const updateModal = new bootstrap.Modal(document.getElementById('updateModal'));
    const modalStudentInfo = document.getElementById('modalStudentInfo');
    const additionalAmount = document.getElementById('additionalAmount');
    const generateInvoiceCheck = document.getElementById('generateInvoiceCheck');
    const confirmUpdateBtn = document.getElementById('confirmUpdateBtn');

    // Progress Elements
    const progressOverlay = document.getElementById('progressOverlay');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const progressStep = document.getElementById('progressStep');

    let allStudents = [];
    let selectedStudent = null;

    // Coaching details for invoice
    const COACHING_DETAILS = {
        name: "QUEST COACHING CENTRE",
        address: "Block More, Gopalganj, Bihar – 841428",
        mobile: "9708442525",
        email: "questcoachingcentre@gmail.com",
        website: "https://krishnakush500.github.io/Quest-Coaching-Centre/"
    };

    // Show progress with percentage
    function updateProgress(percent, step) {
        progressFill.style.width = percent + '%';
        progressText.textContent = percent + '% Complete';
        if (step) {
            progressStep.textContent = step;
        }
    }

    // Hide progress
    function hideProgress() {
        progressOverlay.style.display = 'none';
    }

    // Show progress
    function showProgress() {
        progressOverlay.style.display = 'flex';
        updateProgress(0, 'Starting...');
    }

    // Load students from Firebase
    async function loadStudents() {
        // Check if Firebase is initialized
        if (!feesCollection) {
            tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Firebase not connected. Please refresh the page.</div>';
            return;
        }

        try {
            const snapshot = await feesCollection.get();
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            renderTable();
        } catch (error) {
            console.error('Error loading:', error);
            tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Error loading from Firebase: ' + error.message + '</div>';
        }
    }

    // Render Table (One line per student)
    function renderTable() {
        const selectedSession = sessionFilter.value;
        const selectedClass = classFilter.value;

        let filtered = allStudents.filter(s => s.session === selectedSession);
        if (selectedClass !== 'All') {
            filtered = filtered.filter(s => s.class === selectedClass);
        }

        if (filtered.length === 0) {
            tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-users-slash"></i> No students found</div>';
            return;
        }

        // Sort by roll number
        filtered.sort((a, b) => (a.roll_number || '').localeCompare(b.roll_number || ''));

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Roll</th>
                        <th>Student Name</th>
                        <th>Father Name</th>
                        <th>Total</th>
                        <th>Received</th>
                        <th>Due</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
        `;

        filtered.forEach(s => {
            html += `
                <tr>
                    <td><span class="amount-badge">${s.roll_number}</span></td>
                    <td>
                        <span class="student-name">${s.student_name}</span>
                        <div class="father-name">${s.father_name}</div>
                    </td>
                    <td>${s.father_name}</td>
                    <td><span class="amount-badge">₹${Number(s.total_amount).toLocaleString()}</span></td>
                    <td><span class="amount-badge">₹${Number(s.received_amount).toLocaleString()}</span></td>
                    <td><span class="due-badge">₹${Number(s.due_amount).toLocaleString()}</span></td>
                    <td>
                        <button class="update-btn" onclick="openUpdateModal('${s.id}')">
                            <i class="fas fa-edit"></i> Update
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        tableContainer.innerHTML = html;
    }

    // Open Update Modal (Global function for onclick)
    window.openUpdateModal = function(studentId) {
        selectedStudent = allStudents.find(s => s.id === studentId);
        if (!selectedStudent) return;

        // Fill modal with student info
        modalStudentInfo.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="background: #1b4f9b; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h6 style="margin: 0; font-weight: 700;">${selectedStudent.student_name}</h6>
                    <p style="margin: 0; color: #5f6b7a;">Roll: ${selectedStudent.roll_number} | Class: ${selectedStudent.class}</p>
                    <p style="margin: 0; color: #5f6b7a;">Due Amount: <span style="color: #b91c1c; font-weight: 700;">₹${Number(selectedStudent.due_amount).toLocaleString()}</span></p>
                </div>
            </div>
        `;

        additionalAmount.value = '';
        updateModal.show();
    };

    // Confirm Update Button
    confirmUpdateBtn.addEventListener('click', async () => {
        if (!selectedStudent) return;

        const amount = parseFloat(additionalAmount.value);
        if (isNaN(amount) || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }

        if (amount > selectedStudent.due_amount) {
            if (!confirm(`Amount (₹${amount}) is more than due (₹${selectedStudent.due_amount}). Continue?`)) {
                return;
            }
        }

        // Check Firebase connection
        if (!feesCollection) {
            alert('Firebase not connected. Please refresh the page.');
            return;
        }

        // Hide modal and show progress
        updateModal.hide();
        showProgress();

        try {
            // Step 1: Validating (10%)
            updateProgress(10, 'Validating payment...');
            await new Promise(resolve => setTimeout(resolve, 500));

            // Step 2: Calculating (30%)
            updateProgress(30, 'Calculating new amounts...');
            await new Promise(resolve => setTimeout(resolve, 600));
            
            const newReceived = (selectedStudent.received_amount || 0) + amount;
            const newDue = Math.max(0, (selectedStudent.total_amount || 0) - newReceived);

            // Step 3: Connecting to Firebase (60%)
            updateProgress(60, 'Connecting to Firebase...');
            await new Promise(resolve => setTimeout(resolve, 700));

            // Step 4: Updating database (80%)
            updateProgress(80, 'Updating database...');
            
            // Get document reference properly
            const docRef = feesCollection.doc(selectedStudent.id);
            await docRef.update({
                received_amount: newReceived,
                due_amount: newDue
            });

            // Step 5: Preparing invoice (95%)
            updateProgress(95, 'Preparing invoice...');
            await new Promise(resolve => setTimeout(resolve, 600));

            // Reload table
            await loadStudents();

            // Generate Invoice if checked
            if (generateInvoiceCheck.checked) {
                // Prepare invoice data
                const invoiceData = {
                    student: {
                        ...selectedStudent,
                        received_amount: newReceived,
                        due_amount: newDue
                    },
                    paymentAmount: amount,
                    date: new Date().toLocaleString(),
                    transactionId: 'TXN' + Date.now(),
                    coaching: COACHING_DETAILS
                };

                // Step 6: Complete (100%)
                updateProgress(100, 'Complete! Opening invoice...');
                await new Promise(resolve => setTimeout(resolve, 800));

                // Hide progress
                hideProgress();

                // Open invoice page
                const invoiceWindow = window.open('about:blank', '_blank');
                invoiceWindow.document.write(generateInvoiceHTML(invoiceData));
                invoiceWindow.document.close();
            } else {
                updateProgress(100, 'Update complete!');
                await new Promise(resolve => setTimeout(resolve, 500));
                hideProgress();
                alert(`✅ ₹${amount} added successfully!`);
            }

        } catch (error) {
            console.error('Update error:', error);
            hideProgress();
            alert('Error updating: ' + error.message);
        }
    });

    // Generate Invoice HTML with updated coaching details
    function generateInvoiceHTML(data) {
        const s = data.student;
        const coaching = data.coaching;
        const logoUrl = "https://i.ibb.co/hF9tmnpB/20250903-202922.jpg";
        const date = new Date();
        const invoiceNo = 'INV-' + Date.now();

        return `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Fee Invoice - ${s.student_name}</title>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                <style>
                    body { background: #f4f7fc; padding: 20px; }
                    .invoice-box {
                        max-width: 900px;
                        margin: auto;
                        background: white;
                        border-radius: 30px;
                        padding: 30px;
                        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                    }
                    .invoice-header {
                        display: flex;
                        align-items: center;
                        gap: 20px;
                        margin-bottom: 30px;
                        padding-bottom: 20px;
                        border-bottom: 2px dashed #1b4f9b;
                    }
                    .logo {
                        width: 100px;
                        height: 100px;
                        border-radius: 50%;
                        object-fit: cover;
                        border: 3px solid #1b4f9b;
                    }
                    .coaching-name {
                        font-size: 2rem;
                        font-weight: 800;
                        color: #1b4f9b;
                        margin: 0;
                    }
                    .coaching-details {
                        color: #5f6b7a;
                        font-size: 0.95rem;
                        margin-top: 5px;
                    }
                    .coaching-details i {
                        width: 20px;
                        color: #1b4f9b;
                        margin-right: 5px;
                    }
                    .invoice-title {
                        font-size: 1.8rem;
                        font-weight: 700;
                        color: #113a5e;
                        margin-bottom: 20px;
                    }
                    .details-grid {
                        display: grid;
                        grid-template-columns: repeat(2, 1fr);
                        gap: 20px;
                        margin-bottom: 30px;
                        background: #f8faff;
                        padding: 20px;
                        border-radius: 20px;
                    }
                    .detail-item {
                        display: flex;
                        flex-direction: column;
                    }
                    .detail-label {
                        font-size: 0.9rem;
                        color: #5f6b7a;
                    }
                    .detail-value {
                        font-size: 1.1rem;
                        font-weight: 600;
                        color: #113155;
                    }
                    .amount-table {
                        width: 100%;
                        margin-bottom: 30px;
                    }
                    .amount-table td {
                        padding: 15px;
                        border: 1px solid #e0eaf5;
                    }
                    .total-row {
                        background: #1b4f9b;
                        color: white;
                        font-weight: 700;
                    }
                    .footer {
                        text-align: center;
                        margin-top: 30px;
                        padding-top: 20px;
                        border-top: 2px dashed #1b4f9b;
                        color: #5f6b7a;
                    }
                    .btn-group {
                        display: flex;
                        gap: 10px;
                        justify-content: center;
                        margin-bottom: 30px;
                    }
                    .btn {
                        border-radius: 50px;
                        padding: 12px 30px;
                        font-weight: 600;
                    }
                    .website-link {
                        color: #1b4f9b;
                        text-decoration: none;
                    }
                    .website-link:hover {
                        text-decoration: underline;
                    }
                    @media print {
                        .btn-group { display: none; }
                    }
                </style>
            </head>
            <body>
                <div class="invoice-box">
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i> Print Invoice
                        </button>
                        <button class="btn btn-success" onclick="downloadPDF()">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button class="btn btn-secondary" onclick="window.close()">
                            <i class="fas fa-times"></i> Close
                        </button>
                    </div>

                    <div class="invoice-header">
                        <img src="${logoUrl}" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
                        <div>
                            <h1 class="coaching-name">${coaching.name}</h1>
                            <div class="coaching-details">
                                <p style="margin: 2px 0;"><i class="fas fa-map-marker-alt"></i> ${coaching.address}</p>
                                <p style="margin: 2px 0;"><i class="fas fa-phone"></i> ${coaching.mobile}</p>
                                <p style="margin: 2px 0;"><i class="fas fa-envelope"></i> ${coaching.email}</p>
                                <p style="margin: 2px 0;"><i class="fas fa-globe"></i> <a href="${coaching.website}" target="_blank" class="website-link">${coaching.website}</a></p>
                            </div>
                        </div>
                    </div>

                    <h2 class="invoice-title"><i class="fas fa-file-invoice"></i> Fee Payment Invoice</h2>
                    
                    <div class="details-grid">
                        <div class="detail-item">
                            <span class="detail-label">Invoice Number</span>
                            <span class="detail-value">${invoiceNo}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Date</span>
                            <span class="detail-value">${date.toLocaleDateString()} ${date.toLocaleTimeString()}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Student Name</span>
                            <span class="detail-value">${s.student_name}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Roll Number</span>
                            <span class="detail-value">${s.roll_number}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Father's Name</span>
                            <span class="detail-value">${s.father_name}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Class & Session</span>
                            <span class="detail-value">${s.class} (${s.session})</span>
                        </div>
                    </div>

                    <table class="amount-table">
                        <tr>
                            <th>Description</th>
                            <th>Amount (₹)</th>
                        </tr>
                        <tr>
                            <td>Total Fee</td>
                            <td><strong>₹${Number(s.total_amount).toLocaleString()}</strong></td>
                        </tr>
                        <tr>
                            <td>Previous Payment</td>
                            <td>₹${Number(s.received_amount - data.paymentAmount).toLocaleString()}</td>
                        </tr>
                        <tr style="background: #e8f0fe;">
                            <td><strong>Current Payment</strong></td>
                            <td><strong style="color: #16a34a;">+ ₹${data.paymentAmount.toLocaleString()}</strong></td>
                        </tr>
                        <tr class="total-row">
                            <td><strong>Total Paid</strong></td>
                            <td><strong>₹${Number(s.received_amount).toLocaleString()}</strong></td>
                        </tr>
                        <tr>
                            <td>Remaining Due</td>
                            <td><span style="color: #b91c1c; font-weight: 700;">₹${Number(s.due_amount).toLocaleString()}</span></td>
                        </tr>
                    </table>

                    <div style="background: #f8faff; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                        <p style="margin: 0; display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-check-circle" style="color: #16a34a; font-size: 1.5rem;"></i>
                            <span><strong>Payment Status:</strong> ${s.due_amount <= 0 ? 'Fully Paid' : 'Partial Paid'}</span>
                        </p>
                        <p style="margin: 5px 0 0 35px; color: #5f6b7a;">
                            Transaction ID: ${data.transactionId}
                        </p>
                    </div>

                    <div class="footer">
                        <p>Thank you for timely payment! ✨</p>
                        <p style="font-size: 0.9rem;">This is a computer generated invoice - valid without signature</p>
                    </div>
                </div>

                <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
                <script>
                    function downloadPDF() {
                        const element = document.querySelector('.invoice-box');
                        html2canvas(element, { scale: 2 }).then(canvas => {
                            const imgData = canvas.toDataURL('image/png');
                            const { jsPDF } = window.jspdf;
                            const pdf = new jsPDF({
                                orientation: 'portrait',
                                unit: 'mm',
                                format: 'a4'
                            });
                            const imgWidth = 210;
                            const pageHeight = 297;
                            const imgHeight = (canvas.height * imgWidth) / canvas.width;
                            let heightLeft = imgHeight;
                            let position = 0;
                            
                            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                            heightLeft -= pageHeight;
                            
                            while (heightLeft >= 0) {
                                position = heightLeft - imgHeight;
                                pdf.addPage();
                                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                                heightLeft -= pageHeight;
                            }
                            pdf.save('Invoice_${s.roll_number}_${s.student_name}.pdf');
                        });
                    }
                <\/script>
            </body>
            </html>
        `;
    }

    // Event listeners
    sessionFilter.addEventListener('change', renderTable);
    classFilter.addEventListener('change', renderTable);

    // Initial load - check if Firebase is initialized
    if (feesCollection) {
        loadStudents();
        // Refresh every 10 seconds
        setInterval(loadStudents, 10000);
    } else {
        tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Firebase connection failed. Please refresh the page.</div>';
    }
</script>
</body>
</html>
