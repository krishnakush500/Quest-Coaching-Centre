<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✏️ Update Student Fee · Fee Manager</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body{ background:#f2f6fb; padding:20px 16px; }
        .container{ max-width:1200px; margin:0 auto; }
        .page-header{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; margin-bottom:30px; }
        .page-header h1{ font-size:2.2rem; color:#113a5e; display:flex; align-items:center; gap:12px; background:white; padding:12px 32px; border-radius:60px; box-shadow:0 6px 14px rgba(0,30,60,0.1); }
        .back-link a{ color:#1b4f9b; text-decoration:none; display:flex; align-items:center; gap:8px; font-size:1.1rem; background:white; padding:12px 28px; border-radius:40px; }
        .filter-panel{ background:white; border-radius:70px; padding:28px 32px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:30px 40px; margin-bottom:40px; box-shadow:0 18px 28px -10px #99b8d9; }
        .filter-group{ display:flex; align-items:center; gap:15px; }
        .filter-group label{ font-weight:700; color:#154e7a; font-size:1.3rem; display:flex; align-items:center; gap:8px; }
        select{ background:#e8f2ff; border:2px solid #b1cdf0; border-radius:50px; padding:14px 38px 14px 26px; font-size:1.2rem; font-weight:600; color:#10345c; cursor:pointer; appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%231b4f9b" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 18px center; min-width:180px; }
        .cards-grid{ display:flex; flex-wrap:wrap; gap:24px; justify-content:center; margin-top:15px; }
        .student-card{ background:white; border-radius:48px; padding:28px 22px; width:100%; max-width:340px; box-shadow:0 25px 35px -12px #2a4d7a; border-left:10px solid #2563eb; }
        .card-header{ display:flex; align-items:center; gap:12px; margin-bottom:22px; background:#dbeafe; padding:12px 18px; border-radius:50px; }
        .card-header h3{ font-size:1.6rem; color:#113155; }
        .detail-row{ display:flex; justify-content:space-between; background:#f1f7ff; margin:12px 0; padding:12px 20px; border-radius:50px; font-size:1.1rem; }
        .due-highlight{ background:#fee9e7; border:2px solid #dc2626; }
        .update-btn{ background:linear-gradient(145deg, #2563eb, #1b4b9b); border:none; color:white; font-size:1.3rem; font-weight:700; padding:16px; width:100%; border-radius:60px; display:flex; align-items:center; justify-content:center; gap:12px; margin:20px 0 5px; cursor:pointer; }
        .prompt-box{ background:#e6f0ff; border-radius:50px; padding:20px; margin-top:20px; border:3px solid #2563eb; display:none; }
        .prompt-box input{ width:100%; padding:16px; font-size:1.2rem; border:2px solid #a5c4f0; border-radius:50px; margin-bottom:15px; }
        .confirm-btn{ background:#16a34a; border:none; color:white; font-size:1.2rem; padding:14px; width:100%; border-radius:50px; cursor:pointer; }
        .empty-message{ background:white; padding:40px; border-radius:70px; text-align:center; font-size:1.4rem; width:100%; }
        .loading{ text-align:center; padding:40px; font-size:1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1><span>✏️</span> Update Fee</h1>
        <div class="back-link"><a href="dashboard.html">⬅️ Back to Dashboard</a></div>
    </div>

    <div class="filter-panel">
        <div class="filter-group">
            <label>📅 Session</label>
            <select id="sessionFilter">
                <option value="2024-25">2024-25</option>
                <option value="2025-26" selected>2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🏫 Class</label>
            <select id="classFilter">
                <option value="All">All Classes</option>
                <option value="Class 6">Class 6</option>
                <option value="Class 7">Class 7</option>
                <option value="Class 8">Class 8</option>
                <option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option>
            </select>
        </div>
    </div>

    <div id="cardsContainer" class="cards-grid">
        <div class="loading">⏳ Loading students from Firebase...</div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // ✅ Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const feesCollection = db.collection('fees');

    const sessionFilter = document.getElementById('sessionFilter');
    const classFilter = document.getElementById('classFilter');
    const container = document.getElementById('cardsContainer');

    let allStudents = [];

    // Load students from Firebase
    async function loadStudents() {
        try {
            const snapshot = await feesCollection.get();
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            renderCards();
        } catch (error) {
            console.error('Error loading:', error);
            container.innerHTML = '<div class="empty-message">❌ Error loading from Firebase</div>';
        }
    }

    // Render cards
    function renderCards() {
        const selectedSession = sessionFilter.value;
        const selectedClass = classFilter.value;

        let filtered = allStudents.filter(s => s.session === selectedSession);
        if (selectedClass !== 'All') {
            filtered = filtered.filter(s => s.class === selectedClass);
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-message">📭 No students found</div>';
            return;
        }

        container.innerHTML = '';
        filtered.forEach(s => {
            const card = document.createElement('div');
            card.className = 'student-card';
            card.setAttribute('data-id', s.id);
            card.innerHTML = `
                <div class="card-header">
                    <span style="font-size:2rem;">👤</span>
                    <h3>${s.student_name}</h3>
                </div>
                <div class="detail-row"><span>Roll</span> <strong>${s.roll_number}</strong></div>
                <div class="detail-row"><span>Father</span> <strong>${s.father_name}</strong></div>
                <div class="detail-row"><span>💰 Total</span> <strong>₹${Number(s.total_amount).toLocaleString()}</strong></div>
                <div class="detail-row"><span>✅ Received</span> <strong>₹${Number(s.received_amount).toLocaleString()}</strong></div>
                <div class="detail-row due-highlight"><span>⏳ Due</span> <strong>₹${Number(s.due_amount).toLocaleString()}</strong></div>
                <button class="update-btn" data-id="${s.id}" data-roll="${s.roll_number}" data-name="${s.student_name}">
                    💰 Update Fee
                </button>
                <div class="prompt-box" id="prompt-${s.id}">
                    <input type="number" id="input-${s.id}" placeholder="Enter additional amount" min="1">
                    <button class="confirm-btn" data-id="${s.id}">✔ Confirm Update</button>
                </div>
            `;
            container.appendChild(card);
        });

        // Add event listeners
        document.querySelectorAll('.update-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                document.querySelectorAll('.prompt-box').forEach(p => p.style.display = 'none');
                document.getElementById(`prompt-${id}`).style.display = 'block';
            });
        });

        document.querySelectorAll('.confirm-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                const input = document.getElementById(`input-${id}`);
                const additional = parseFloat(input.value);
                
                if (isNaN(additional) || additional <= 0) {
                    alert('❌ Enter valid amount');
                    return;
                }

                // Find student
                const student = allStudents.find(s => s.id === id);
                if (!student) return;

                const newReceived = (student.received_amount || 0) + additional;
                const newDue = Math.max(0, (student.total_amount || 0) - newReceived);

                try {
                    // Update in Firebase
                    await feesCollection.doc(id).update({
                        received_amount: newReceived,
                        due_amount: newDue
                    });
                    
                    alert(`✅ Updated: ₹${additional} added to ${student.student_name}`);
                    
                    // Reload data
                    await loadStudents();
                    
                } catch (error) {
                    console.error('Update error:', error);
                    alert('❌ Error updating: ' + error.message);
                }
            });
        });
    }

    // Event listeners
    sessionFilter.addEventListener('change', renderCards);
    classFilter.addEventListener('change', renderCards);

    // Initial load
    loadStudents();

    // Refresh every 5 seconds
    setInterval(loadStudents, 5000);
</script>
</body>
</html>
