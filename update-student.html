<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✏️ Update Student Fee · Fee Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f2f6fb;
            padding: 20px 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 2rem;
            color: #113a5e;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 10px 28px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,30,60,0.1);
        }
        .back-link a {
            color: #1b4f9b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            background: white;
            padding: 10px 24px;
            border-radius: 40px;
        }

        /* Filter Panel */
        .filter-panel {
            background: white;
            border-radius: 50px;
            padding: 20px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px -8px #99b8d9;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-weight: 600;
            color: #154e7a;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        select {
            background: #e8f2ff;
            border: 2px solid #b1cdf0;
            border-radius: 40px;
            padding: 10px 32px 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #10345c;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%231b4f9b" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
            min-width: 150px;
        }

        /* Small Student Cards - Ek line mein */
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
            margin-top: 15px;
        }
        .student-card {
            background: white;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 8px 15px -5px #2a4d7a;
            border-left: 6px solid #2563eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: 0.2s;
        }
        .student-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px #1e3f70;
        }
        .student-info {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .student-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .student-name {
            font-weight: 700;
            color: #113155;
            font-size: 1rem;
        }
        .student-roll {
            background: #dbeafe;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .student-fee {
            display: flex;
            gap: 8px;
            font-size: 0.85rem;
        }
        .fee-badge {
            background: #e8f0fe;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .due-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
        }
        .update-small-btn {
            background: #2563eb;
            border: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .update-small-btn:hover {
            background: #1b4b9b;
            transform: scale(1.05);
        }

        /* Invoice Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #2563eb;
        }
        .modal-header h2 {
            color: #113a5e;
            font-size: 1.6rem;
        }
        .close-btn {
            background: #f1f5f9;
            border: none;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover {
            background: #e2e8f0;
        }

        /* Invoice Design */
        .invoice-box {
            background: #f8fafc;
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid #2563eb;
        }
        .coaching-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .coaching-header h1 {
            color: #1b4f9b;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .coaching-header p {
            color: #334155;
            font-size: 0.9rem;
        }
        .invoice-details {
            margin: 20px 0;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #cbd5e1;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: 600;
            color: #475569;
        }
        .detail-value {
            font-weight: 700;
            color: #1e293b;
        }
        .amount-highlight {
            background: #2563eb;
            color: white;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .invoice-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        .invoice-btn {
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            justify-content: center;
        }
        .download-btn {
            background: #2563eb;
            color: white;
        }
        .print-btn {
            background: #16a34a;
            color: white;
        }
        .invoice-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .empty-message {
            background: white;
            padding: 40px;
            border-radius: 50px;
            text-align: center;
            font-size: 1.2rem;
            width: 100%;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            width: 100%;
        }

        @media (max-width: 700px) {
            .student-card {
                max-width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }
            .update-small-btn {
                width: 100%;
                text-align: center;
            }
            .invoice-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="page-header">
        <h1><span>✏️</span> Update Fee</h1>
        <div class="back-link"><a href="dashboard.html">⬅️ Back to Dashboard</a></div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-group">
            <label>📅 Session</label>
            <select id="sessionFilter">
                <option value="2024-25">2024-25</option>
                <option value="2025-26" selected>2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🏫 Class</label>
            <select id="classFilter">
                <option value="All">All Classes</option>
                <option value="Class 6">Class 6</option>
                <option value="Class 7">Class 7</option>
                <option value="Class 8">Class 8</option>
                <option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option>
            </select>
        </div>
    </div>

    <!-- Student Cards - Small Size -->
    <div id="cardsContainer" class="cards-grid">
        <div class="loading">⏳ Loading students from Firebase...</div>
    </div>
</div>

<!-- Invoice Modal -->
<div id="invoiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🧾 Fee Invoice</h2>
            <button class="close-btn" onclick="closeInvoiceModal()">✕</button>
        </div>
        
        <div id="invoiceContent" class="invoice-box">
            <!-- Invoice content will be filled dynamically -->
        </div>
        
        <div class="invoice-actions">
            <button class="invoice-btn download-btn" id="downloadInvoiceBtn">
                📥 Download Invoice
            </button>
            <button class="invoice-btn print-btn" id="printInvoiceBtn">
                🖨️ Print Invoice
            </button>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<!-- jsPDF for PDF download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const feesCollection = db.collection('fees');

    // DOM Elements
    const sessionFilter = document.getElementById('sessionFilter');
    const classFilter = document.getElementById('classFilter');
    const container = document.getElementById('cardsContainer');
    const invoiceModal = document.getElementById('invoiceModal');
    const invoiceContent = document.getElementById('invoiceContent');

    let allStudents = [];
    let currentStudentForInvoice = null;

    // Load students from Firebase
    async function loadStudents() {
        try {
            const snapshot = await feesCollection.get();
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            renderCards();
        } catch (error) {
            console.error('Error loading:', error);
            container.innerHTML = '<div class="empty-message">❌ Error loading from Firebase</div>';
        }
    }

    // Render small cards
    function renderCards() {
        const selectedSession = sessionFilter.value;
        const selectedClass = classFilter.value;

        let filtered = allStudents.filter(s => s.session === selectedSession);
        if (selectedClass !== 'All') {
            filtered = filtered.filter(s => s.class === selectedClass);
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-message">📭 No students found</div>';
            return;
        }

        container.innerHTML = '';
        filtered.forEach(s => {
            const card = document.createElement('div');
            card.className = 'student-card';
            card.setAttribute('data-id', s.id);
            
            card.innerHTML = `
                <div class="student-info">
                    <div class="student-info-row">
                        <span class="student-name">${s.student_name}</span>
                        <span class="student-roll">Roll: ${s.roll_number}</span>
                    </div>
                    <div class="student-info-row">
                        <span class="fee-badge">₹${Number(s.total_amount).toLocaleString()}</span>
                        <span class="fee-badge">✅ ₹${Number(s.received_amount).toLocaleString()}</span>
                        <span class="due-badge">⏳ ₹${Number(s.due_amount).toLocaleString()}</span>
                    </div>
                </div>
                <button class="update-small-btn" onclick="openInvoiceModal('${s.id}')">
                    💰 Update
                </button>
            `;
            container.appendChild(card);
        });
    }

    // Open Invoice Modal
    window.openInvoiceModal = async function(studentId) {
        const student = allStudents.find(s => s.id === studentId);
        if (!student) return;
        
        currentStudentForInvoice = student;
        
        // Generate invoice HTML
        const invoiceHTML = generateInvoiceHTML(student);
        invoiceContent.innerHTML = invoiceHTML;
        
        // Show modal
        invoiceModal.classList.add('active');
    };

    // Generate Invoice HTML
    function generateInvoiceHTML(student) {
        const date = new Date().toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'long',
            year: 'numeric'
        });
        
        return `
            <div class="coaching-header">
                <h1>🏆 QUEST COACHING CENTRE</h1>
                <p>📞 +91 98765 43210 | ✉️ questcoaching@gmail.com</p>
                <p>📍 123, Education Street, Patna - 800001</p>
            </div>
            
            <div style="text-align: center; margin: 20px 0;">
                <span style="background: #2563eb; color: white; padding: 8px 25px; border-radius: 40px; font-weight: 700;">
                    FEE RECEIPT
                </span>
            </div>
            
            <div class="invoice-details">
                <div class="detail-row">
                    <span class="detail-label">Receipt No:</span>
                    <span class="detail-value">FEE/${student.roll_number}/${new Date().getFullYear()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value">${date}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Session:</span>
                    <span class="detail-value">${student.session}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Class:</span>
                    <span class="detail-value">${student.class}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Roll Number:</span>
                    <span class="detail-value">${student.roll_number}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Student Name:</span>
                    <span class="detail-value">${student.student_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Father's Name:</span>
                    <span class="detail-value">${student.father_name}</span>
                </div>
                <div class="detail-row" style="margin-top: 15px;">
                    <span class="detail-label">Total Fee:</span>
                    <span class="detail-value">₹${Number(student.total_amount).toLocaleString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount Paid:</span>
                    <span class="detail-value" style="color: #16a34a; font-weight: 800;">₹${Number(student.received_amount).toLocaleString()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Balance Due:</span>
                    <span class="detail-value" style="color: #dc2626; font-weight: 800;">₹${Number(student.due_amount).toLocaleString()}</span>
                </div>
            </div>
            
            <div style="text-align: center; margin: 25px 0 10px; padding: 15px; background: #dbeafe; border-radius: 30px;">
                <span style="font-size: 1.1rem;">💰 <strong>Amount Received:</strong> ₹${Number(student.received_amount).toLocaleString()}</span>
            </div>
            
            <div style="text-align: center; font-style: italic; color: #475569; margin-top: 20px;">
                Thank you for your payment! ✨
            </div>
        `;
    }

    // Close Modal
    window.closeInvoiceModal = function() {
        invoiceModal.classList.remove('active');
        currentStudentForInvoice = null;
    };

    // Download PDF Invoice
    document.getElementById('downloadInvoiceBtn').addEventListener('click', function() {
        if (!currentStudentForInvoice) return;
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const student = currentStudentForInvoice;
            const date = new Date().toLocaleDateString();
            
            // Add content
            doc.setFontSize(20);
            doc.setTextColor(0, 102, 204);
            doc.text('QUEST COACHING CENTRE', 105, 20, { align: 'center' });
            
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text('123, Education Street, Patna - 800001', 105, 30, { align: 'center' });
            doc.text('📞 +91 98765 43210', 105, 37, { align: 'center' });
            
            doc.setFontSize(16);
            doc.setTextColor(0, 0, 0);
            doc.text('FEE RECEIPT', 105, 50, { align: 'center' });
            
            doc.setFontSize(11);
            doc.text(`Receipt No: FEE/${student.roll_number}/${new Date().getFullYear()}`, 20, 70);
            doc.text(`Date: ${date}`, 150, 70);
            doc.text(`Session: ${student.session}`, 20, 80);
            doc.text(`Class: ${student.class}`, 150, 80);
            doc.text(`Roll Number: ${student.roll_number}`, 20, 90);
            doc.text(`Student Name: ${student.student_name}`, 20, 100);
            doc.text(`Father's Name: ${student.father_name}`, 20, 110);
            
            doc.setFontSize(12);
            doc.text('Fee Details:', 20, 130);
            
            doc.setFontSize(11);
            doc.text(`Total Fee: ₹${Number(student.total_amount).toLocaleString()}`, 30, 145);
            doc.text(`Amount Paid: ₹${Number(student.received_amount).toLocaleString()}`, 30, 155);
            doc.text(`Balance Due: ₹${Number(student.due_amount).toLocaleString()}`, 30, 165);
            
            doc.setFontSize(14);
            doc.setTextColor(0, 102, 0);
            doc.text(`Amount Received: ₹${Number(student.received_amount).toLocaleString()}`, 105, 190, { align: 'center' });
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text('Thank you for your payment! ✨', 105, 210, { align: 'center' });
            
            doc.save(`Invoice_${student.roll_number}_${student.student_name}.pdf`);
            
        } catch (error) {
            console.error('PDF Error:', error);
            alert('Error generating PDF: ' + error.message);
        }
    });

    // Print Invoice
    document.getElementById('printInvoiceBtn').addEventListener('click', function() {
        if (!currentStudentForInvoice) return;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>Fee Invoice - ${currentStudentForInvoice.student_name}</title>
                    <style>
                        body { font-family: Arial; padding: 40px; }
                        .invoice { max-width: 600px; margin: auto; border: 2px solid #2563eb; padding: 30px; border-radius: 30px; }
                        h1 { color: #2563eb; text-align: center; }
                        .details { margin: 20px 0; }
                        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ccc; }
                        .label { font-weight: bold; }
                        .amount { font-size: 1.2rem; background: #dbeafe; padding: 10px; border-radius: 30px; text-align: center; }
                        .footer { text-align: center; margin-top: 30px; font-style: italic; }
                    </style>
                </head>
                <body>
                    <div class="invoice">
                        ${generateInvoiceHTML(currentStudentForInvoice)}
                    </div>
                </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    });

    // Event listeners for filters
    sessionFilter.addEventListener('change', renderCards);
    classFilter.addEventListener('change', renderCards);

    // Close modal when clicking outside
    window.addEventListener('click', function(e) {
        if (e.target === invoiceModal) {
            closeInvoiceModal();
        }
    });

    // Initial load
    loadStudents();

    // Refresh every 10 seconds
    setInterval(loadStudents, 10000);
</script>
</body>
</html>
