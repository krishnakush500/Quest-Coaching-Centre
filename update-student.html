<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✏️ Update Student Fee · Fee Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f5fa;
            padding: 16px 12px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .page-header {
            background: white;
            border-radius: 40px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .page-header h1 {
            font-size: 1.6rem;
            color: #113a5e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link a {
            color: #1b4f9b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            padding: 6px 16px;
            background: #e8f0fe;
            border-radius: 40px;
            font-size: 0.95rem;
        }
        
        /* Filter Panel */
        .filter-panel {
            background: white;
            border-radius: 50px;
            padding: 16px 22px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,30,60,0.08);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-group label {
            font-weight: 600;
            color: #154e7a;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        select {
            background: #e8f2ff;
            border: 1px solid #b1cdf0;
            border-radius: 40px;
            padding: 8px 28px 8px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #10345c;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%231b4f9b" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            min-width: 130px;
        }

        /* Table Card */
        .table-card {
            background: white;
            border-radius: 30px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0,40,70,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            background: #1b4f9b;
            color: white;
            padding: 12px 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: left;
            white-space: nowrap;
        }
        th:first-child { border-radius: 16px 0 0 0; }
        th:last-child { border-radius: 0 16px 0 0; }
        
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e0eaf5;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f5faff; }
        
        .student-name {
            font-weight: 600;
            color: #113155;
        }
        .father-name {
            font-size: 0.85rem;
            color: #5f6b7a;
        }
        .amount-badge {
            background: #e8f0fe;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            font-size: 0.9rem;
        }
        .due-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            font-size: 0.9rem;
        }
        .paid-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            font-size: 0.9rem;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .update-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .update-btn:hover:not(:disabled) {
            background: #1b4b9b;
            transform: scale(1.02);
        }
        .update-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .delete-btn:hover {
            background: #b91c1c;
            transform: scale(1.02);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #1b4f9b;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            color: #5f6b7a;
        }

        /* Progress Overlay */
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(3px);
        }
        .progress-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .progress-card h3 {
            color: #1b4f9b;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .progress-bar-container {
            width: 100%;
            height: 16px;
            background: #e8f0fe;
            border-radius: 30px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1b4f9b, #2563eb);
            border-radius: 30px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1b4f9b;
            margin: 10px 0;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #e8f0fe;
            border-top: 4px solid #1b4f9b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .page-header h1 { font-size: 1.3rem; }
            .filter-group { width: 100%; }
            select { width: 100%; min-width: auto; }
            td, th { padding: 8px 5px; font-size: 0.8rem; }
            .action-buttons { flex-direction: column; gap: 4px; }
            .update-btn, .delete-btn { padding: 4px 8px; font-size: 0.7rem; }
            .progress-card { padding: 20px; }
            .amount-badge, .due-badge, .paid-badge { padding: 3px 6px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="page-header">
        <h1><i class="fas fa-edit"></i> Update Student Fee</h1>
        <div class="back-link">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Session</label>
            <select id="sessionFilter">
                <option value="2024-25">2024-25</option>
                <option value="2025-26">2025-26</option>
                <option value="2026-27" selected>2026-27</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-school"></i> Class</label>
            <select id="classFilter">
                <option value="All">All Classes</option>
                <option value="Class 6">Class 6</option>
                <option value="Class 7">Class 7</option>
                <option value="Class 8">Class 8</option>
                <option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option>
                <option value="Class 11">Class 11</option>
                <option value="Class 12">Class 12</option>
            </select>
        </div>
    </div>

    <!-- Students Table -->
    <div class="table-card">
        <div id="studentsTableContainer">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading students...</div>
        </div>
    </div>
</div>

<!-- Update Modal -->
<div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 25px;">
            <div class="modal-header" style="border-bottom: 2px solid #e9ecef; padding: 18px 22px;">
                <h5 class="modal-title" style="color: #1b4f9b; font-weight: 700;">
                    <i class="fas fa-rupee-sign"></i> Update Fee & Generate Invoice
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 22px;">
                <div id="modalStudentInfo" style="background: #f8faff; padding: 15px; border-radius: 18px; margin-bottom: 20px;">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Additional Amount (₹)</label>
                    <input type="number" id="additionalAmount" class="form-control form-control-lg" min="1" placeholder="Enter amount" style="border-radius: 20px;">
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="generateInvoiceCheck" checked>
                    <label class="form-check-label fw-bold">
                        <i class="fas fa-file-invoice"></i> Generate Invoice after update
                    </label>
                </div>
            </div>
            <div class="modal-footer" style="border-top: 2px solid #e9ecef; padding: 18px;">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius: 50px; padding: 10px 20px;">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" id="confirmUpdateBtn" class="btn btn-primary" style="border-radius: 50px; padding: 10px 20px; background: #1b4f9b;">
                    <i class="fas fa-check"></i> Update
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Progress Overlay -->
<div id="progressOverlay" class="progress-overlay">
    <div class="progress-card">
        <div class="spinner"></div>
        <h3><i class="fas fa-sync-alt fa-spin"></i> Processing</h3>
        <div class="progress-bar-container">
            <div id="progressFill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <div id="progressText" class="progress-text">0% Complete</div>
        <div id="progressStep" class="progress-step">Initializing...</div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    // Initialize Firebase
    let db, feesCollection;
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.firestore();
        feesCollection = db.collection('fees');
        console.log('Firebase initialized');
    } catch (error) {
        console.error('Firebase error:', error);
    }

    // DOM Elements
    const sessionFilter = document.getElementById('sessionFilter');
    const classFilter = document.getElementById('classFilter');
    const tableContainer = document.getElementById('studentsTableContainer');
    const modalStudentInfo = document.getElementById('modalStudentInfo');
    const additionalAmount = document.getElementById('additionalAmount');
    const generateInvoiceCheck = document.getElementById('generateInvoiceCheck');
    const confirmUpdateBtn = document.getElementById('confirmUpdateBtn');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const progressStep = document.getElementById('progressStep');

    const updateModal = new bootstrap.Modal(document.getElementById('updateModal'));
    let allStudents = [];
    let selectedStudent = null;

    // Complete Coaching Details
    const COACHING_DETAILS = {
        name: "QUEST COACHING CENTRE",
        phone: "9708442525",
        email: "questcoachingcentre@gmail.com",
        address: "Block More, Gopalganj, Bihar - 841428",
        msme: "UDYAM-BR-13-0023012",
        website: "https://krishnakush500.github.io/Quest-Coaching-Centre/",
        feeStructure: {
            tuition: 7200,
            admission: 500,
            assignment: 500,
            examination: 500,
            subtotal: 8700,
            discount: 1500,
            final: 7200
        },
        bank: {
            accountName: "RAVIRANJAN KUMAR",
            bankName: "Axis Bank, Gopalganj",
            accountNumber: "917010042629997",
            ifsc: "UTIB0001075",
            upi: "9708442525@ybl"
        },
        terms: [
            "Ek baar jama ki gayi fees kisi bhi paristhiti me refund ya transfer nahi ki jayegi.",
            "Agar tuition fees do installments me jama ki jati hai to: First installment: 4000 rs admission ke samay, Second installment: 4000 rs ek mahine ke andar jama karni hogi.",
            "Agar second installment samay par jama nahi hoti hai to student ka class entry rok diya ja sakta hai.",
            "Bina kisi suchna ke lagatar 10 din tak absent rehne par student ka admission cancel kiya ja sakta hai.",
            "Coaching me badtameezi ya mobile ka galat use karne par turant admission cancel ho sakta hai.",
            "Student ke personal saman (cycle, mobile, bag etc.) ki zimmedari student ki hogi.",
            "Coaching ko batch timing aur rules badalne ka adhikar hai.",
            "Kisi bhi legal dispute ki sthiti me jurisdiction District Court Gopalganj, Bihar hoga."
        ]
    };

    // Professional Toast Functions
    function showSuccessToast(message) {
        Swal.fire({
            icon: 'success',
            title: 'Success!',
            text: message,
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });
    }

    function showErrorToast(message) {
        Swal.fire({
            icon: 'error',
            title: 'Error!',
            text: message,
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true
        });
    }

    function showWarningToast(message) {
        Swal.fire({
            icon: 'warning',
            title: 'Warning!',
            text: message,
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });
    }

    // Professional Confirmation for Delete
    async function showDeleteConfirmation(studentName) {
        const result = await Swal.fire({
            title: 'Are you sure?',
            html: `You are about to delete <strong>${studentName}</strong><br>This action cannot be undone!`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel',
            reverseButtons: true
        });
        return result.isConfirmed;
    }

    // Professional Popup for Fully Paid Student
    function showFullyPaidPopup(studentName) {
        Swal.fire({
            title: 'Fully Paid!',
            html: `<strong>${studentName}</strong> has already paid the full fee.<br>No further updates are allowed.`,
            icon: 'info',
            confirmButtonColor: '#1b4f9b',
            confirmButtonText: 'OK'
        });
    }

    function updateProgress(percent, step) {
        progressFill.style.width = percent + '%';
        progressText.textContent = percent + '% Complete';
        if (step) progressStep.textContent = step;
    }

    function showProgress() {
        progressOverlay.style.display = 'flex';
        updateProgress(0, 'Starting...');
    }

    function hideProgress() {
        progressOverlay.style.display = 'none';
    }

    // Load students from Firebase
    async function loadStudents() {
        if (!feesCollection) {
            tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Firebase not connected</div>';
            return;
        }

        try {
            const snapshot = await feesCollection.get();
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
        } catch (error) {
            tableContainer.innerHTML = '<div class="empty-message">Error loading: ' + error.message + '</div>';
        }
    }

    // Render Table with Delete Button
    function renderTable() {
        const selectedSession = sessionFilter.value;
        const selectedClass = classFilter.value;

        let filtered = allStudents.filter(s => s.session === selectedSession);
        if (selectedClass !== 'All') {
            filtered = filtered.filter(s => s.class === selectedClass);
        }

        if (filtered.length === 0) {
            tableContainer.innerHTML = '<div class="empty-message"><i class="fas fa-users-slash"></i> No students found</div>';
            return;
        }

        filtered.sort((a, b) => (a.roll_number || '').localeCompare(b.roll_number || ''));

        let html = `<table><thead><tr><th>Roll</th><th>Student Name</th><th>Father</th><th>Total</th><th>Received</th><th>Due</th><th>Actions</th></tr></thead><tbody>`;
        
        filtered.forEach(s => {
            const isFullyPaid = s.due_amount <= 0;
            const dueBadge = isFullyPaid ? 'paid-badge' : 'due-badge';
            const dueText = isFullyPaid ? 'PAID' : `₹${Number(s.due_amount).toLocaleString()}`;
            
            html += `
                <tr>
                    <td><span class="amount-badge">${s.roll_number}</span></td>
                    <td>
                        <span class="student-name">${s.student_name}</span>
                        <div class="father-name">${s.father_name}</div>
                    </td>
                    <td>${s.father_name}</td>
                    <td><span class="amount-badge">₹${Number(s.total_amount).toLocaleString()}</span></td>
                    <td><span class="amount-badge">₹${Number(s.received_amount).toLocaleString()}</span></td>
                    <td><span class="${dueBadge}">${dueText}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="update-btn" onclick="openUpdateModal('${s.id}')" ${isFullyPaid ? 'disabled' : ''}>
                                <i class="fas fa-edit"></i> Update
                            </button>
                            <button class="delete-btn" onclick="deleteStudent('${s.id}', '${s.student_name}')">
                                <i class="fas fa-trash-alt"></i> Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        tableContainer.innerHTML = html;
    }

    // Delete Student Function
    window.deleteStudent = async function(studentId, studentName) {
        // Show confirmation
        const confirmed = await showDeleteConfirmation(studentName);
        if (!confirmed) return;

        showProgress();
        
        try {
            updateProgress(30, 'Finding student...');
            await new Promise(r => setTimeout(r, 400));

            updateProgress(60, 'Connecting to Firebase...');
            await new Promise(r => setTimeout(r, 400));

            updateProgress(80, 'Deleting student...');
            await feesCollection.doc(studentId).delete();

            updateProgress(100, 'Deleted!');
            await new Promise(r => setTimeout(r, 500));

            hideProgress();
            showSuccessToast(`✅ Student "${studentName}" deleted successfully!`);
            
            // Reload students
            await loadStudents();
            
        } catch (error) {
            hideProgress();
            showErrorToast('Error deleting student: ' + error.message);
        }
    };

    // Open Update Modal
    window.openUpdateModal = function(studentId) {
        selectedStudent = allStudents.find(s => s.id === studentId);
        if (!selectedStudent) return;

        // Check if fully paid
        if (selectedStudent.due_amount <= 0) {
            showFullyPaidPopup(selectedStudent.student_name);
            return;
        }

        modalStudentInfo.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="background: #1b4f9b; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h6 style="margin: 0; font-weight: 700;">${selectedStudent.student_name}</h6>
                    <p style="margin: 0; color: #5f6b7a; font-size: 0.9rem;">Roll: ${selectedStudent.roll_number} | Class: ${selectedStudent.class}</p>
                    <p style="margin: 0; color: #5f6b7a; font-size: 0.9rem;">Due: <span style="color: #b91c1c; font-weight: 700;">₹${Number(selectedStudent.due_amount).toLocaleString()}</span></p>
                </div>
            </div>
        `;
        additionalAmount.value = '';
        updateModal.show();
    };

    // Professional Confirmation for Update
    async function showProfessionalConfirmation(amount, dueAmount) {
        const result = await Swal.fire({
            title: 'Confirm Payment Update',
            html: `
                <div style="text-align: left;">
                    <p><strong>Amount to add:</strong> ₹${amount.toLocaleString()}</p>
                    <p><strong>Current Due:</strong> ₹${dueAmount.toLocaleString()}</p>
                    <p><strong>New Due:</strong> ₹${Math.max(0, dueAmount - amount).toLocaleString()}</p>
                    ${amount > dueAmount ? '<p style="color: #b91c1c;">⚠️ Amount exceeds due amount!</p>' : ''}
                </div>
            `,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#1b4f9b',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, proceed',
            cancelButtonText: 'Cancel',
            reverseButtons: true
        });
        return result.isConfirmed;
    }

    // Confirm Update Button
    confirmUpdateBtn.addEventListener('click', async () => {
        if (!selectedStudent) return;

        const amount = parseFloat(additionalAmount.value);
        if (isNaN(amount) || amount <= 0) {
            showErrorToast('Please enter a valid amount');
            return;
        }

        // Check if fully paid again (double check)
        if (selectedStudent.due_amount <= 0) {
            updateModal.hide();
            showFullyPaidPopup(selectedStudent.student_name);
            return;
        }

        // Show professional confirmation
        const confirmed = await showProfessionalConfirmation(amount, selectedStudent.due_amount);
        if (!confirmed) return;

        updateModal.hide();
        showProgress();

        try {
            updateProgress(10, 'Validating payment...');
            await new Promise(r => setTimeout(r, 400));

            updateProgress(30, 'Calculating...');
            await new Promise(r => setTimeout(r, 400));
            
            const newReceived = (selectedStudent.received_amount || 0) + amount;
            const newDue = Math.max(0, (selectedStudent.total_amount || 0) - newReceived);

            updateProgress(60, 'Connecting to Firebase...');
            await new Promise(r => setTimeout(r, 400));

            updateProgress(80, 'Updating database...');
            const docRef = feesCollection.doc(selectedStudent.id);
            await docRef.update({ received_amount: newReceived, due_amount: newDue });

            await loadStudents();

            if (generateInvoiceCheck.checked) {
                updateProgress(95, 'Generating invoice...');
                await new Promise(r => setTimeout(r, 500));
                
                const updatedStudent = {
                    ...selectedStudent,
                    received_amount: newReceived,
                    due_amount: newDue
                };
                
                const invoiceData = {
                    student: updatedStudent,
                    paymentAmount: amount,
                    date: new Date(),
                    transactionId: 'TXN' + Date.now(),
                    coaching: COACHING_DETAILS
                };

                hideProgress();
                
                // Open invoice in the same tab
                const invoiceHTML = generateInvoiceHTML(invoiceData);
                document.open();
                document.write(invoiceHTML);
                document.close();
                
            } else {
                updateProgress(100, 'Complete!');
                await new Promise(r => setTimeout(r, 400));
                hideProgress();
                showSuccessToast(`✅ ₹${amount} added successfully!`);
            }
        } catch (error) {
            hideProgress();
            showErrorToast('Error: ' + error.message);
        }
    });

                <script>
                    function downloadPDF() {
                        const { jsPDF } = window.jspdf;
                        const element = document.querySelector('.invoice-a4');
                        
                        html2canvas(element, { 
                            scale: 2,
                            logging: false,
                            allowTaint: true,
                            useCORS: true
                        }).then(canvas => {
                            const imgData = canvas.toDataURL('image/png');
                            const pdf = new jsPDF({
                                orientation: 'portrait',
                                unit: 'mm',
                                format: 'a4'
                            });
                            
                            const pdfWidth = pdf.internal.pageSize.getWidth();
                            const pdfHeight = pdf.internal.pageSize.getHeight();
                            const imgWidth = canvas.width;
                            const imgHeight = canvas.height;
                            const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight);
                            const width = imgWidth * ratio;
                            const height = imgHeight * ratio;
                            
                            pdf.addImage(imgData, 'PNG', (pdfWidth - width) / 2, 0, width, height);
                            pdf.save('Invoice_${s.roll_number}_${s.student_name}.pdf');
                        });
                    }
