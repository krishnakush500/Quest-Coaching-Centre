<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ Add Student · Fee Manager</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body{ background:#f0f5fa; padding:24px 16px; display:flex; flex-direction:column; align-items:center; }
        .form-card{ background:white; max-width:700px; width:100%; margin:20px auto; border-radius:48px; padding:36px 30px; box-shadow:0 25px 40px -15px #1e3b5b; }
        h2{ display:flex; align-items:center; gap:12px; color:#174873; margin-bottom:32px; font-size:2rem; }
        .field{ margin-bottom:24px; }
        label{ font-weight:600; display:flex; align-items:center; gap:6px; margin-bottom:10px; color:#1b4a77; font-size:1.1rem; }
        input, select{ width:100%; padding:16px 22px; font-size:1rem; background:#f3f8ff; border:1px solid #b8ceec; border-radius:60px; outline:none; }
        input:focus{ border-color:#1b5e9e; background:white; }
        .row2{ display:flex; gap:15px; flex-wrap:wrap; }
        .row2 .field{ flex:1 1 200px; }
        .due-highlight{ background:#f0ebe5; color:#b44; font-weight:700; }
        .btn-submit{ background:#1b4f9b; border:none; color:white; font-size:1.4rem; font-weight:700; padding:20px; width:100%; border-radius:60px; display:flex; align-items:center; justify-content:center; gap:12px; margin-top:20px; cursor:pointer; box-shadow:0 15px 20px -8px #123a60; transition:0.2s; }
        .btn-submit:hover{ background:#0f3d73; }
        .info-note{ text-align:center; margin-top:24px; color:#2c577c; }
        a{ color:#1b4f9b; font-weight:600; text-decoration:none; }
        .loading{ text-align:center; padding:20px; }
    </style>
</head>
<body>
<div class="form-card">
    <h2>📋 Add New Student</h2>
    <div class="field">
        <label>🔢 Roll Number</label>
        <input type="text" id="rollNumber" placeholder="e.g. 24" required>
    </div>
    <div class="field">
        <label>🧑 Student Name</label>
        <input type="text" id="studentName" placeholder="Full name" required>
    </div>
    <div class="field">
        <label>👨 Father Name</label>
        <input type="text" id="fatherName" placeholder="Father's name" required>
    </div>
    <div class="row2">
        <div class="field">
            <label>💰 Total Amount (₹)</label>
            <input type="number" id="totalAmount" value="0" min="0" step="1" required>
        </div>
        <div class="field">
            <label>💵 Received (₹)</label>
            <input type="number" id="receivedAmount" value="0" min="0" step="1" required>
        </div>
        <div class="field">
            <label>⏳ Due (auto)</label>
            <input type="number" id="dueAmount" class="due-highlight" readonly value="0">
        </div>
    </div>
    <div class="row2">
        <div class="field">
            <label>📅 Session</label>
            <select id="sessionSelect">
                <option value="2024-25">2024-25</option>
                <option value="2025-26" selected>2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>
        <div class="field">
            <label>🏫 Class</label>
            <select id="classSelect">
                <option value="Class 6">Class 6</option>
                <option value="Class 7">Class 7</option>
                <option value="Class 8" selected>Class 8</option>
                <option value="Class 9">Class 9</option>
                <option value="Class 10">Class 10</option>
            </select>
        </div>
    </div>
    <button class="btn-submit" id="addStudentBtn">➕ Add Student & Save to Firebase</button>
    <div class="info-note">↩ <a href="dashboard.html">Back to dashboard</a></div>
    <div id="loadingMessage" class="loading" style="display:none;">⏳ Saving to Firebase...</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // ✅ Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const feesCollection = db.collection('fees');

    // DOM Elements
    const totalInp = document.getElementById('totalAmount');
    const receivedInp = document.getElementById('receivedAmount');
    const dueInp = document.getElementById('dueAmount');
    const loadingMsg = document.getElementById('loadingMessage');

    // Auto calculate due
    function updateDue() {
        const total = parseFloat(totalInp.value) || 0;
        const rec = parseFloat(receivedInp.value) || 0;
        dueInp.value = Math.max(0, total - rec);
    }
    totalInp.addEventListener('input', updateDue);
    receivedInp.addEventListener('input', updateDue);
    updateDue();

    // Add Student Button
    document.getElementById('addStudentBtn').addEventListener('click', async function() {
        const roll = document.getElementById('rollNumber').value.trim();
        const name = document.getElementById('studentName').value.trim();
        const father = document.getElementById('fatherName').value.trim();
        const total = parseFloat(totalInp.value) || 0;
        const received = parseFloat(receivedInp.value) || 0;
        const due = parseFloat(dueInp.value) || (total - received);
        const session = document.getElementById('sessionSelect').value;
        const classVal = document.getElementById('classSelect').value;

        if (!roll || !name || !father) {
            alert('❌ Please fill all fields (roll, name, father)');
            return;
        }

        // Show loading
        loadingMsg.style.display = 'block';
        this.disabled = true;

        try {
            // Create student object
            const newStudent = {
                roll_number: roll,
                student_name: name,
                father_name: father,
                class: classVal,
                session: session,
                total_amount: total,
                received_amount: received,
                due_amount: due,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            };

            // Save to Firebase
            await feesCollection.add(newStudent);
            
            alert('✅ Student added to Firebase successfully!');
            
            // Clear form
            document.getElementById('rollNumber').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('fatherName').value = '';
            totalInp.value = '0';
            receivedInp.value = '0';
            updateDue();
            
        } catch (error) {
            console.error('Error saving to Firebase:', error);
            alert('❌ Error saving to Firebase: ' + error.message);
        } finally {
            loadingMsg.style.display = 'none';
            this.disabled = false;
        }
    });
</script>
</body>
</html>
