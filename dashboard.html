<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>📊 Teacher Dashboard · Fee Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4fa;
            padding: 20px 16px 32px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* 🎨 Session Bar */
        .session-bar {
            background: white;
            border-radius: 60px;
            padding: 16px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,20,40,0.08);
        }
        .session-bar label {
            font-weight: 700;
            color: #1e3a5f;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        select {
            background: #e8f0fe;
            border: 2px solid #c1d6f0;
            border-radius: 50px;
            padding: 12px 32px 12px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #113155;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%231d4e7a" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
            min-width: 150px;
        }
        .teacher-badge {
            margin-left: auto;
            background: #d7e7ff;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            color: #0a3a66;
        }

        /* 🏫 Class Filter */
        .filter-section {
            background: linear-gradient(145deg, #ffffff, #eef4fc);
            border-radius: 50px;
            padding: 18px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 25px;
            margin: 10px 0 25px;
            border: 1px solid #bdd3ec;
        }
        .filter-section span {
            font-size: 1.2rem;
            font-weight: 700;
            color: #124072;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 📦 Summary Boxes */
        .summary-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 30px;
        }
        .summary-item {
            flex: 1 1 200px;
            border-radius: 40px;
            padding: 30px 15px;
            text-align: center;
            box-shadow: 0 20px 30px -8px rgba(0, 40, 70, 0.3);
            color: white;
            font-weight: 600;
            transition: transform 0.2s;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .summary-item:hover {
            transform: scale(1.02);
        }
        
        .summary-item.total {
            background: linear-gradient(145deg, #2b6ed7, #1a4bbf);
        }
        .summary-item.received {
            background: linear-gradient(145deg, #2b9c5c, #1b7a45);
        }
        .summary-item.due {
            background: linear-gradient(145deg, #d33838, #aa2424);
        }
        
        .summary-emoji {
            font-size: 3rem;
            margin-bottom: 12px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
        }
        .summary-label {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .summary-value {
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        /* 🔘 Buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 30px 0 25px;
        }
        .btn {
            border: none;
            padding: 18px 45px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 15px 25px -8px #1e3b5b;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn-primary {
            background: #1b4f9b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f3f7a;
            transform: translateY(-3px);
        }
        .btn-outline {
            background: white;
            color: #1b4f9b;
            border: 2px solid #1b4f9b;
        }
        .btn-outline:hover {
            background: #e1efff;
        }

        /* 🕒 Recent Updates */
        .updates-card {
            background: white;
            border-radius: 40px;
            padding: 28px;
            margin-top: 20px;
            box-shadow: 0 20px 30px -10px #a5bbd5;
        }
        .updates-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #113a5e;
            margin-bottom: 25px;
        }
        .update-item {
            background: #f6faff;
            border-radius: 50px;
            padding: 16px 25px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            border-left: 8px solid #f5a623;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            font-size: 1.05rem;
        }
        .update-date { 
            font-weight: 700; 
            color: #0b4980; 
            background: #d9e9ff;
            padding: 5px 15px;
            border-radius: 40px;
        }
        .update-roll { 
            background: #1b4f9b; 
            color: white;
            padding: 5px 15px; 
            border-radius: 40px; 
            font-weight: 600; 
        }
        .update-name { 
            font-weight: 600; 
            color: #152b3c; 
        }
        .update-amount { 
            margin-left: auto; 
            font-weight: 800; 
            background: #c7f0d2; 
            padding: 7px 20px; 
            border-radius: 40px; 
            color: #0c6e3c;
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .summary-item { flex: 1 1 100%; }
            .update-item { flex-direction: column; align-items: flex-start; }
            .update-amount { margin-left: 0; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 📅 SESSION DROPDOWN - TOP -->
    <div class="session-bar">
        <label>📆 Session</label>
        <select id="sessionSelect">
            <option value="2024-25">2024-25</option>
            <option value="2025-26" selected>2025-26</option>
            <option value="2026-27">2026-27</option>
        </select>
        <div class="teacher-badge">👩‍🏫 Teacher Dashboard</div>
    </div>

    <!-- 🏫 CLASS FILTER -->
    <div class="filter-section">
        <span>🔽 Filter by Class</span>
        <select id="classSelect">
            <option value="All">📚 All Classes (default)</option>
            <option value="Class 6">🎒 Class 6</option>
            <option value="Class 7">📘 Class 7</option>
            <option value="Class 8">📗 Class 8</option>
            <option value="Class 9">📕 Class 9</option>
            <option value="Class 10">📙 Class 10</option>
        </select>
    </div>

    <!-- 💰 SUMMARY BOXES -->
    <div class="summary-row">
        <div class="summary-item total">
            <div class="summary-emoji">💰💰</div>
            <div class="summary-label">TOTAL FEE</div>
            <div class="summary-value" id="totalAmount">₹0</div>
        </div>
        <div class="summary-item received">
            <div class="summary-emoji">✅✅</div>
            <div class="summary-label">RECEIVED</div>
            <div class="summary-value" id="receivedAmount">₹0</div>
        </div>
        <div class="summary-item due">
            <div class="summary-emoji">⏳⏳</div>
            <div class="summary-label">DUE AMOUNT</div>
            <div class="summary-value" id="dueAmount">₹0</div>
        </div>
    </div>

    <!-- 🔘 MAIN BUTTONS -->
    <div class="action-buttons">
        <button class="btn btn-primary" id="addStudentBtn">➕ ADD STUDENT</button>
        <button class="btn btn-outline" id="updateStudentBtn">✏️ UPDATE STUDENT</button>
    </div>

    <!-- 🕒 RECENT UPDATES SECTION -->
    <div class="updates-card">
        <div class="updates-title">
            <span>📋 RECENT UPDATES</span>
            <span style="font-size: 1rem; background: #dbeafe; padding: 5px 15px; border-radius: 30px;">Latest First</span>
        </div>
        <div id="recentUpdatesList">
            <!-- Dynamic content will appear here -->
            <div class="update-item">⏳ Loading updates from Firebase...</div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
    // ✅ Firebase Configuration (given by you)
    const firebaseConfig = {
        apiKey: "AIzaSyBoAqrgPwwM7GNyURqXrJEYWPihKKR8VGg",
        authDomain: "quest-coaching.firebaseapp.com",
        databaseURL: "https://quest-coaching-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quest-coaching",
        storageBucket: "quest-coaching.firebasestorage.app",
        messagingSenderId: "131948734089",
        appId: "1:131948734089:web:f4ba25110c8b1298360858"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Collection reference for fees
    const feesCollection = db.collection('fees');

    // DOM Elements
    const sessionSelect = document.getElementById('sessionSelect');
    const classSelect = document.getElementById('classSelect');
    const totalSpan = document.getElementById('totalAmount');
    const receivedSpan = document.getElementById('receivedAmount');
    const dueSpan = document.getElementById('dueAmount');
    const recentList = document.getElementById('recentUpdatesList');

    // Global students array
    let allStudents = [];

    // 📥 Load all students from Firebase
    async function loadStudentsFromFirebase() {
        try {
            const snapshot = await feesCollection.get();
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            // After loading, update dashboard
            updateDashboard();
            loadRecentUpdates();
            
        } catch (error) {
            console.error('Error loading students:', error);
            recentList.innerHTML = '<div class="update-item">❌ Error loading from Firebase</div>';
        }
    }

    // 🔄 Update dashboard based on filters
    function updateDashboard() {
        const selectedSession = sessionSelect.value;
        const selectedClass = classSelect.value;

        // Filter students based on session AND class
        let filteredStudents = allStudents.filter(s => s.session === selectedSession);
        
        if (selectedClass !== 'All') {
            filteredStudents = filteredStudents.filter(s => s.class === selectedClass);
        }

        // Calculate totals
        let total = 0, received = 0, due = 0;
        filteredStudents.forEach(s => {
            total += Number(s.total_amount) || 0;
            received += Number(s.received_amount) || 0;
            due += Number(s.due_amount) || 0;
        });

        // Update summary boxes
        totalSpan.innerText = '₹' + total.toLocaleString();
        receivedSpan.innerText = '₹' + received.toLocaleString();
        dueSpan.innerText = '₹' + due.toLocaleString();
    }

    // 🕒 Load recent updates (latest 5)
    async function loadRecentUpdates() {
        try {
            // Get all students with received_amount > 0, sorted by some field
            // Since we don't have timestamp in current schema, we'll just show some recent ones
            const snapshot = await feesCollection.get();
            const students = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.received_amount > 0) {
                    students.push(data);
                }
            });
            
            // Sort by name or roll for demo (in real app, you'd have timestamp)
            // For demo, we'll just show last 5
            const recent = students.slice(-5).reverse();
            
            if (recent.length === 0) {
                recentList.innerHTML = '<div class="update-item">📌 No recent payments</div>';
                return;
            }
            
            recentList.innerHTML = '';
            recent.forEach(s => {
                const div = document.createElement('div');
                div.className = 'update-item';
                // Use current date for demo
                const today = new Date();
                const dateStr = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                
                div.innerHTML = `
                    <span class="update-date">${dateStr}</span>
                    <span class="update-roll">Roll ${s.roll_number}</span>
                    <span class="update-name">${s.student_name}</span>
                    <span class="update-amount">₹${s.received_amount} received</span>
                `;
                recentList.appendChild(div);
            });
            
        } catch (error) {
            console.error('Error loading recent updates:', error);
        }
    }

    // 👂 Event Listeners
    sessionSelect.addEventListener('change', updateDashboard);
    classSelect.addEventListener('change', updateDashboard);

    // 🔘 Button Navigation
    document.getElementById('addStudentBtn').addEventListener('click', () => {
        window.location.href = 'add-student.html';
    });

    document.getElementById('updateStudentBtn').addEventListener('click', () => {
        window.location.href = 'update-student.html';
    });

    // 🚀 Initial load from Firebase
    loadStudentsFromFirebase();

    // Refresh data every 5 seconds (optional - for real-time updates)
    setInterval(loadStudentsFromFirebase, 5000);

</script>

</body>
</html>
